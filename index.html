<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
const password = prompt("クラスコードを入力してください");
if(password !== "hokuto2026"){
  document.body.innerHTML = "<h2 style='font-family:sans-serif;text-align:center;margin-top:3rem;'>アクセスできません</h2>";
}
</script>

<title>頻出語句クイズ（No.1101-1200）</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-shell">
  <header class="site-header">
    <h1>頻出語句クイズ（No.1101-1200）</h1>
    <p class="subtitle">授業用 英単語4択クイズ</p>
  </header>

  <main>
    <section class="card menu-card" id="menu">
      <h2>出題設定</h2>
      <div class="form-grid">
        <label>
          <span>開始番号</span>
          <input type="number" id="start" min="1101" max="1200" value="1101">
        </label>
        <label>
          <span>終了番号</span>
          <input type="number" id="end" min="1101" max="1200" value="1200">
        </label>
      </div>

      <div class="mode-group">
        <p>出題順</p>
        <div class="mode-buttons">
          <button type="button" class="mode-btn active" data-mode="order">順番通り</button>
          <button type="button" class="mode-btn" data-mode="random">ランダム</button>
        </div>
      </div>

      <div class="action-row">
        <button class="primary-btn" id="startBtn">スタート</button>
      </div>
    </section>

    <section class="card quiz-card hidden" id="quiz">
      <div class="quiz-top">
        <div class="progress-wrap">
          <div id="progressText">1 / 100</div>
          <div class="progress-bar"><div id="progressFill"></div></div>
        </div>
        <button class="ghost-btn" id="menuBackTop">メニューに戻る</button>
      </div>

      <div class="word-area">
        <div class="word-line">
          <h2 id="word">word</h2>
          <button class="sound-btn" id="speakBtn" aria-label="音声再生">🔊</button>
        </div>
      </div>

      <div class="choices" id="choices"></div>

      <div id="feedback" class="feedback hidden"></div>

      <div class="nav-row">
        <button class="ghost-btn" id="prevBtn">前へ</button>
        <button class="ghost-btn" id="nextBtn">次へ</button>
      </div>

      <div class="menu-row">
        <button class="ghost-btn" id="restartBtn">同条件でリスタート</button>
        <button class="ghost-btn" id="resetBtn">別範囲でやり直し</button>
        <button class="ghost-btn" id="menuBackBottom">メニューに戻る</button>
      </div>
    </section>

    <section class="card result-card hidden" id="result">
      <h2>結果</h2>
      <p id="scoreText"></p>
      <div class="menu-row">
        <button class="primary-btn" id="restartFromResult">同条件でリスタート</button>
        <button class="ghost-btn" id="resetFromResult">別範囲でやり直し</button>
        <button class="ghost-btn" id="menuFromResult">メニューに戻る</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    本教材は授業内利用を目的とした補助教材です。<br>
    市販教材を参考にしていますが、例文・表現は独自に作成しています。
  </footer>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
